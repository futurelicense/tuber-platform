services:
  - type: web
    name: tuber-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard # always-on — both vendored apps hold job state in-process; free-tier
                   # idle spin-down would silently kill in-flight clip cuts / video assembly
    preDeployCommand: "flask db upgrade" # applies migrations before the new instance takes traffic
    envVars:
      - key: FLASK_APP
        value: wsgi:platform_app
      - key: SECRET_KEY
        generateValue: true
      # Database is Supabase (Session pooler connection string), not a Render-
      # managed Postgres — set manually in the dashboard, not linked via
      # fromDatabase. Keep this in sync with the cron job's DATABASE_URL below.
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false # e.g. https://tuber-platform.onrender.com — no trailing slash
      - key: GEO_API_URL
        value: http://ip-api.com/json
      - key: CHANNEL_TOKEN_ENC_KEY
        generateValue: true
      - key: CLIPPER_DOWNLOAD_DIR
        value: /app/data/clips
      - key: YTPROD_OUTPUT_DIR
        value: /app/data/output
      - key: AI_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_ENDPOINT
        value: https://api.groq.com/openai/v1/chat/completions
      - key: HF_API_KEY
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
    disk:
      name: media-storage
      mountPath: /app/data
      sizeGB: 10
    healthCheckPath: /healthz

  - type: cron
    name: tuber-suggest-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 */6 * * *" # every 6 hours
    dockerCommand: "flask run-suggest-agent"
    envVars:
      - key: FLASK_APP
        value: wsgi:platform_app
      - key: SECRET_KEY
        sync: false # same value as the web service's — not security-sensitive
                     # here since this process never serves HTTP sessions, but
                     # config.py requires it to be set to boot the app at all
      - key: DATABASE_URL
        sync: false # same Supabase connection string as the web service
      - key: PUBLIC_BASE_URL
        sync: false
      - key: AI_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_ENDPOINT
        value: https://api.groq.com/openai/v1/chat/completions
    # Deliberately no `disk:` — nothing in the agent's path touches
    # CLIPPER_DOWNLOAD_DIR/YTPROD_OUTPUT_DIR (channel listing and transcript
    # fetch both use skip_download/extract_flat), and Render persistent disks
    # attach to exactly one service anyway, so this couldn't share the web
    # service's disk even if something later needed it to.
